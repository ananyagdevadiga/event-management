# =============================================
# Nginx Reverse Proxy Configuration
# =============================================
# This server block handles all traffic on port 80
#
# ROUTING FLOW:
# 1. Client request hits port 80 (Nginx)
# 2. Nginx checks the URI path:
#    - Static assets (JS, CSS, images) → Served directly from /usr/share/nginx/html
#    - All other paths → Returns index.html (React Router handles client-side routing)
# 3. React app communicates with Supabase API directly via HTTPS
#    (Supabase URL is baked into the React build)
#
# WHY NO API PROXY BLOCK?
#    The React frontend uses the Supabase JS client which calls
#    Supabase's hosted API (https://xxx.supabase.co) directly.
#    No custom backend server exists, so no API proxy is needed.
#    If a custom backend is added later, add a proxy_pass block here.
# =============================================

server {
    listen 80;
    server_name localhost;

    # Root directory for React static files
    root /usr/share/nginx/html;
    index index.html;

    # ==========================================
    # Security Headers
    # ==========================================
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ==========================================
    # Gzip Compression (Performance)
    # ==========================================
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # ==========================================
    # Frontend: Serve React SPA
    # ==========================================
    # All routes are served by React
    # try_files checks for exact file match first (CSS, JS, images)
    # If no file found, serves index.html for React Router
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ==========================================
    # Static Asset Caching
    # ==========================================
    # Cache JS, CSS, images for 1 year (they have content hashes in filenames)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ==========================================
    # Deny access to hidden files (.env, .git, etc.)
    # ==========================================
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
